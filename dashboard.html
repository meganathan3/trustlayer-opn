<button id="connectBtn" class="connect">
  🔗 Choose Wallet
</button>

<p id="walletStatus">Wallet not connected</p>

<script type="module">
import { createWeb3Modal, defaultConfig } from
'https://esm.sh/@web3modal/ethers5';

const projectId = 'YOUR_WALLETCONNECT_PROJECT_ID';

const opnTestnet = {
  chainId: 1337, // replace with actual OPN testnet chain ID
  name: 'OPN Testnet',
  currency: 'OPN',
  explorerUrl: '',
  rpcUrl: ''
};

const metadata = {
  name: 'TrustLayer OPN',
  description: 'Trust Infrastructure for OPN',
  url: window.location.origin,
  icons: []
};

createWeb3Modal({
  ethersConfig: defaultConfig({ metadata }),
  chains: [opnTestnet],
  projectId,
  enableAnalytics: false
});

document.getElementById('connectBtn').addEventListener('click', async () => {
  try {
    const modal = document.querySelector('w3m-button');
  } catch (e) {
    console.error(e);
  }
});
</script>

<w3m-button></w3m-button>
